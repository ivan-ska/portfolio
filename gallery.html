<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Directory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ========================================= */
        /*       DESIGN SYSTEM (ДИЗАЙН СИСТЕМА)      */
        /* ========================================= */

        :root {
            --color-black: #000000;
            --color-white: #FFFFFF;
            --color-translucent-w: rgba(255, 255, 255, 0.7);
            --color-active: rgba(0, 0, 0, 0.07);
            --color-inactive: rgba(0, 0, 0, 0.4);

            --b-blur: blur(40px);

            --r-small: 2px;
            --r-large: 4px;

            --font-family: 'DM Mono', monospace;
            --font-weight: 400;

            --h2-size: 20px;
            --h2-line-height: 1.2;
            --h2-letter-spacing: -0.03em;

            --h3-size: 16px;
            --h3-line-height: 1.2;
            --h3-letter-spacing: -0.03em;

            --text-size: 13px;
            --text-line-height: 1.2;
            --text-letter-spacing: -0.02em;

            --icon-arrow-project-left: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-left-d.svg');
            --icon-arrow-project-right: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-right-d.svg');
            --icon-cross-large: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/cross-large-d.svg');
            --icon-play: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/play-d.svg');
        }

        @media (max-width: 600px) {
            :root {
                --h2-size: 18px;
                --h3-size: 14px;
                --text-size: 12px;

                --icon-arrow-project-left: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-left-m.svg');
                --icon-arrow-project-right: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-right-m.svg');
                --icon-cross-large: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/cross-large-m.svg');
                --icon-play: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/play-m.svg');
            }
        }

        .icon-desktop {
            display: block;
        }

        .icon-mobile {
            display: none;
        }

        @media (max-width: 600px) {
            .icon-desktop {
                display: none;
            }

            .icon-mobile {
                display: block;
            }
        }

        /* ========================================= */
        /*                  БАЗА                     */
        /* ========================================= */
        body {
            margin: 0;
            background-color: var(--color-white);
            font-family: var(--font-family);
            font-weight: var(--font-weight);
            color: var(--color-black);
            -webkit-font-smoothing: antialiased;
            padding: 120px 0 0 0;
        }

        /* --- ФЕЙКОВЫЙ ЭКРАН ЗАГРУЗКИ --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--color-white);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .loading-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px 40px;
            background-color: var(--color-active);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
            border-radius: var(--r-large);
        }

        .loading-badge-text {
            font-family: var(--font-family);
            font-weight: var(--font-weight);
            font-size: var(--h3-size);
            line-height: var(--h3-line-height);
            letter-spacing: var(--h3-letter-spacing);
            color: var(--color-black);
            margin: 0;
        }

        .loading-dot {
            fill-opacity: 0.07;
            animation: dot-pulse 1.5s infinite;
        }

        .loading-dot:nth-child(1) {
            animation-delay: 0s;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.5s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes dot-pulse {

            0%,
            15% {
                fill-opacity: 1;
            }

            30%,
            100% {
                fill-opacity: 0.07;
            }
        }

        /* ОБЕРТКА ШАПКИ */
        .header-wrapper {
            position: fixed;
            top: -500px;
            left: 0;
            right: 0;
            padding-top: 500px;
            z-index: 50;

            background-color: var(--color-translucent-w);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
            transform: translateZ(0);
        }

        .header-main {
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            padding: calc(20px + env(safe-area-inset-top, 0px)) 40px 20px 40px;
        }

        /* 12-КОЛОНОЧНАЯ СЕТКА ШАПКИ (ДЕСКТОП) */
        .header-top-row {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 12px;
            align-items: center;
        }

        .header-col-filters {
            grid-column: 1 / span 6;
            display: flex;
        }

        .header-col-about {
            grid-column: 7 / span 5;
            display: flex;
        }

        .header-col-plus {
            grid-column: 12 / span 1;
            display: flex;
            justify-content: flex-end;
        }

        .header-dropdowns-row {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 12px;
            align-items: start;
        }

        #filters-wrapper {
            grid-column: 1 / span 6;
        }

        #about-wrapper {
            grid-column: 7 / span 5;
        }

        .header-nav {
            display: flex;
            gap: 24px;
        }

        /* Кнопки меню в шапке */
        .nav-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            cursor: pointer;

            padding: 6px;
            margin-left: -6px;
            border-radius: var(--r-small);

            font-family: var(--font-family);
            font-weight: var(--font-weight);
            font-size: var(--h3-size);
            line-height: var(--h3-line-height);
            letter-spacing: var(--h3-letter-spacing);

            color: var(--color-black);
            transition: color 0.2s ease, opacity 0.2s ease;
        }

        .nav-toggle:hover {
            opacity: 0.7;
        }

        .nav-toggle.open {
            color: var(--color-inactive);
            opacity: 1;
        }

        .toggle-svg {
            color: inherit;
            transition: transform 0.2s ease;
        }

        .toggle-vertical {
            transition: opacity 0.2s ease;
        }

        .nav-toggle.open .toggle-svg {
            transform: rotate(180deg);
        }

        .nav-toggle.open .toggle-vertical {
            opacity: 0;
        }

        .header-plus-btn {
            padding: 9px;
            border-radius: var(--r-small);
            background-color: var(--color-active);
            border: none;
            cursor: pointer;
            color: var(--color-black);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header-plus-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background-color: var(--color-active);
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .header-plus-btn:hover::after {
            opacity: 1;
        }

        /* ВЫПАДАЮЩИЕ БЛОКИ */
        .dropdown-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            padding-top: 0;
            opacity: 0;
            visibility: hidden;
            transition: grid-template-rows 0.2s ease, padding-top 0.2s ease, opacity 0.2s ease, visibility 0s 0.2s;
        }

        .dropdown-wrapper.open {
            grid-template-rows: 1fr;
            padding-top: 16px;
            opacity: 1;
            visibility: visible;
            transition: grid-template-rows 0.2s ease, padding-top 0.2s ease, opacity 0.2s ease, visibility 0s 0s;
        }

        .dropdown-container {
            overflow: hidden;
        }

        .dropdown-inner {
            display: flex;
            flex-direction: column;
        }

        /* --- ВНУТРЯНКА FILTERS --- */
        #filters-wrapper .dropdown-inner {
            gap: 16px;
            padding-right: 28px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-family: var(--font-family);
            font-weight: var(--font-weight);
            font-size: var(--text-size);
            line-height: var(--text-line-height);
            letter-spacing: var(--text-letter-spacing);
            color: var(--color-black);
            margin: 0;
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        /* --- ВНУТРЯНКА ABOUT --- */
        .about-text {
            margin: 0 0 8px 0;
            padding-right: 26px;
            font-size: var(--text-size);
            line-height: var(--text-line-height);
            letter-spacing: var(--text-letter-spacing);
            color: var(--color-black);
        }

        .about-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        /* Универсальные кнопки-теги */
        .filter-tag {
            background-color: var(--color-active);
            border: none;
            outline: none;
            padding: 4px 8px;
            border-radius: var(--r-small);

            font-size: var(--text-size);
            line-height: var(--text-line-height);
            letter-spacing: var(--text-letter-spacing);
            color: var(--color-black);

            cursor: pointer;
            transition: opacity 0.2s ease;
            font-family: inherit;
            text-decoration: none;

            display: inline-flex;
            align-items: center;
            gap: 4px;
            position: relative;
        }

        .filter-tag::after {
            content: '';
            position: absolute;
            inset: 0;
            background-color: var(--color-active);
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .filter-tag:hover::after {
            opacity: 1;
        }

        .filter-tag.active {
            background-color: var(--color-black) !important;
            color: var(--color-white) !important;
        }

        .arrow-diag,
        .arrow-corn {
            transition: d 0.2s ease-out;
        }

        .filter-tag:hover .arrow-diag {
            d: path("M9 3L3 9");
        }

        .filter-tag:hover .arrow-corn {
            d: path("M9 10L9 3L2 3");
        }

        /* ГАЛЕРЕЯ */
        .gallery {
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 80px;
            padding: 0 40px;
        }

        .loader {
            display: flex;
            justify-content: center;
            margin: 0 auto;
            color: var(--color-black);
        }

        .project-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .project-header {
            margin: 0;
            font-family: var(--font-family);
            font-weight: var(--font-weight);
            font-size: var(--h2-size);
            line-height: var(--h2-line-height);
            letter-spacing: var(--h2-letter-spacing);
            color: var(--color-black);
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        .thumb-card {
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            container-type: size;
        }

        .thumb-media-wrapper {
            padding: 8px;
            background-color: transparent;
            border-radius: var(--r-large);
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
        }

        .thumb-card:hover .thumb-media-wrapper {
            transform: translateY(-4px);
            background-color: var(--color-active);
        }

        .thumb-media-wrapper img,
        .thumb-media-wrapper video {
            max-width: calc(100cqw - 16px);
            max-height: calc(100cqh - 16px);
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: var(--r-small);
            display: block;
        }

        .thumb-media-wrapper video {
            pointer-events: none;
        }

        .video-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--color-translucent-w);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
            border-radius: 50%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 2;
        }

        .video-icon::after {
            content: '';
            display: block;
            width: 24px;
            height: 24px;
            background-color: var(--color-inactive);
            -webkit-mask-image: var(--icon-play);
            -webkit-mask-size: contain;
            -webkit-mask-position: center;
            -webkit-mask-repeat: no-repeat;
            mask-image: var(--icon-play);
            mask-size: contain;
            mask-position: center;
            mask-repeat: no-repeat;
        }

        /* ПОДВАЛ (ФУТЕР) */
        .site-footer {
            max-width: 1280px;
            margin: 80px auto 120px auto;
            padding: 0 40px;
            box-sizing: border-box;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .site-footer-inner {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-logo {
            display: flex;
            align-items: center;
        }

        .footer-text {
            font-family: var(--font-family);
            font-weight: var(--font-weight);
            font-size: var(--h3-size);
            line-height: var(--h3-line-height);
            letter-spacing: var(--h3-letter-spacing);
            color: var(--color-black);
            margin: 0;
        }

        /* ВСПЛЫВАЮЩЕЕ ОКНО (МОДАЛКА) */
        .modal {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color-translucent-w);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
            z-index: 100;
            padding: 40px;
            box-sizing: border-box;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0s 0.3s;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.3s ease, visibility 0s 0s;
        }

        /* Плоская Grid-сетка */
        .modal-content {
            width: 100%;
            height: 100%;
            background: transparent;
            display: grid;
            grid-template-columns: auto 1fr auto;
            grid-template-rows: auto minmax(0, 1fr) auto;
            grid-template-areas:
                ". . top"
                "prev media next"
                ". bottom .";
            column-gap: 40px;
            transform: scale(0.96);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .modal-top {
            grid-area: top;
            justify-self: end;
            margin-bottom: 40px;
        }

        .close-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            color: var(--color-black);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
        }

        .close-btn:hover {
            opacity: 0.7;
        }

        /* Навигация (стрелки) */
        .nav-area {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .nav-area.prev {
            grid-area: prev;
        }

        .nav-area.next {
            grid-area: next;
        }

        .nav-icon-box {
            padding: 9px;
            border-radius: var(--r-small);
            background-color: var(--color-active);
            color: var(--color-black);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .nav-icon-box::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background-color: var(--color-active);
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .nav-area:hover .nav-icon-box::after {
            opacity: 1;
        }

        /* Контейнер для медиа */
        .modal-media {
            grid-area: media;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-media img,
        .modal-media video {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: var(--r-large);
        }

        .modal-center-group {
            display: contents;
        }

        /* Контейнер тегов */
        .modal-bottom {
            grid-area: bottom;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
        }


        /* ========================================= */
        /*               ПОПАП КОНТАКТОВ             */
        /* ========================================= */
        .contact-popup {
            position: fixed;
            z-index: 100;
            width: 366px;
            background-color: var(--color-active);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
            border-radius: var(--r-large);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: default;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s 0.2s;
        }

        .contact-popup.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s 0s;
        }

        .popup-header {
            display: flex;
            justify-content: flex-end;
        }

        .popup-close-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            color: var(--color-black);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
        }

        .popup-close-btn:hover {
            opacity: 0.7;
        }



        /* АДАПТИВ (МОБИЛКА) */
        @media (max-width: 600px) {
            .loading-badge {
                gap: 8px;
            }

            .header-main {
                padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 20px 20px;
            }

            .header-top-row {
                display: flex;
                gap: 20px;
            }

            .header-col-filters,
            .header-col-about {
                grid-column: auto;
                display: block;
            }

            .header-col-plus {
                grid-column: auto;
                margin-left: auto;
            }

            .header-dropdowns-row {
                display: flex;
                flex-direction: column;
                gap: 0;
            }

            #filters-wrapper,
            #about-wrapper {
                grid-column: auto;
            }

            #filters-wrapper .dropdown-inner {
                padding-right: 20px;
            }

            .header-nav {
                gap: 20px;
            }

            .header-plus-btn {
                padding: 8px;
            }

            .gallery {
                padding: 0 20px;
            }

            .site-footer {
                padding: 0 20px;
            }

            .project-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .thumb-media-wrapper {
                padding: 6px;
            }

            .thumb-media-wrapper img,
            .thumb-media-wrapper video {
                max-width: calc(100cqw - 12px);
                max-height: calc(100cqh - 12px);
            }

            .video-icon {
                padding: 13px;
            }

            .video-icon::after {
                width: 20px;
                height: 20px;
            }

            .nav-btn {
                width: 32px;
                height: 32px;
            }

            .nav-btn.prev {
                left: 8px;
            }

            .nav-btn.next {
                right: 8px;
            }


            /* МОБИЛЬНАЯ МОДАЛКА */
            .modal {
                padding: 120px 20px;
                background-color: var(--color-translucent-w);
                backdrop-filter: var(--b-blur);
                -webkit-backdrop-filter: var(--b-blur);
            }

            .modal-content {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto minmax(0, 1fr) auto;
                grid-template-areas:
                    "top top"
                    "center center"
                    "prev next";
                column-gap: 0;
            }

            .modal-center-group {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                grid-area: center;
                min-height: 0;
                margin-bottom: 40px;
            }

            .modal-media {
                flex: 0 1 auto;
                min-height: 0;
                padding: 0;
                margin-bottom: 20px;
            }

            .modal-bottom {
                flex: 0 0 auto;
                margin: 0;
            }

            .modal-top {
                margin-bottom: 40px;
            }

            .close-btn {
                padding: 15px;
                margin: -15px;
            }


            .nav-area {
                padding: 15px;
                margin: -15px;
                align-items: flex-start;
            }

            .nav-area.prev {
                justify-self: start;
            }

            .nav-area.next {
                justify-self: end;
            }

            .nav-icon-box {
                padding: 9px 10px;
            }

            .popup-content {
                width: 310px;
            }

            .contact-popup {
                width: 310px;

        document.addEventListener('click', function (event) {
            const headerWrapper = document.querySelector('.header-wrapper');
            if (!headerWrapper.contains(event.target)) {

                document.getElementById('filters-wrapper').classList.remove('open');

                if (!contactPopup.contains(event.target) && !plusBtn.contains(event.target)) {
                    contactPopup.classList.remove('active');

            }
        });

        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtm-693Wc44CzQx_ASnwQanc45NuieQl6YkoYVavbQ2UBAyPrgxibzDzPoLkUo9cZpdd9RcsPHBsnI/pub?output=csv';

        const fieldColors = {
            'ui/ux': '#D0E4F2', 'web': '#D1EDF4', 'graphic design': '#D7EDE1',
            'digital ad': '#DDEDD7', 'outdoor ad': '#EDF7D3', 'social media': '#F7F1D3',
            'branding': '#FEF0D2', 'logo': '#FEE9D1', 'aso': '#FCE1D1',
            'icon': '#FEE1DD', 'presentation': '#F8DADD', 'merch': '#F5E1F2',
            'stickers': '#E7E3F2', 'motion design': '#DCE5F1'
        };

        const nameMapping = {
            'ecards': 'eCards', 'snrg': 'SNRG', 'pra': 'Pocket Rocket', 'life': 'life:)',
            'embacy': 'Embacy', 'qelvio': 'Qelvio', 'dazzle': 'dazzle', 'mix': 'Mix',
            'ui/ux': 'UI/UX', 'web': 'Web', 'graphic design': 'Graphic Design',
            'digital ad': 'Digital Ad', 'outdoor ad': 'Outdoor Ad', 'social media': 'SMM',
            'branding': 'Branding', 'logo': 'Logo', 'aso': 'ASO', 'icon': 'Icon',
            'presentation': 'Presentation', 'merch': 'Merch', 'stickers': 'Stickers',
            'motion design': 'Motion Design'
        };

        function getDisplayName(val) {
            if (!val) return '';
            const lower = val.toLowerCase().trim();
            return nameMapping[lower] || val;
        }

        const projectOrder = ['ecards', 'snrg', 'pra', 'life', 'embacy', 'qelvio', 'dazzle', 'mix'];
        const fieldOrder = ['ui/ux', 'web', 'graphic design', 'digital ad', 'outdoor ad', 'social media', 'branding', 'logo', 'aso', 'icon', 'presentation', 'merch', 'stickers', 'motion design'];

        let portfolioData = [];
        let filteredIndices = [];
        let currentModalIndex = 0;

        let activeFilters = {
            project: new Set(),
            field: new Set(),
            year: new Set()
        };

        function toggleMenu(menuName, event) {
            if (event) event.stopPropagation();

            const isMobile = window.innerWidth <= 600;
            const filtersBtn = document.getElementById('filters-toggle');
            const filtersWrapper = document.getElementById('filters-wrapper');
            const aboutBtn = document.getElementById('about-toggle');
            const aboutWrapper = document.getElementById('about-wrapper');

            if (menuName === 'filters') {
                if (filtersBtn.classList.contains('open')) {
                    filtersBtn.classList.remove('open');
                    filtersWrapper.classList.remove('open');
                } else {
                    filtersBtn.classList.add('open');
                    filtersWrapper.classList.add('open');
                    if (isMobile) {
                        aboutBtn.classList.remove('open');
                        aboutWrapper.classList.remove('open');
                    }
                }
            } else if (menuName === 'about') {
                if (aboutBtn.classList.contains('open')) {
                    aboutBtn.classList.remove('open');
                    aboutWrapper.classList.remove('open');
                } else {
                    aboutBtn.classList.add('open');
                    aboutWrapper.classList.add('open');
                    if (isMobile) {
                        filtersBtn.classList.remove('open');
                        filtersWrapper.classList.remove('open');
                    }
                }
            }
        }

        function getDirectDropboxUrl(url) {
            if (!url) return '';
            let direct = url.trim();
            if (direct.includes('dropbox.com')) {
                const baseUrl = direct.split('?')[0];
                const rlkeyMatch = direct.match(/rlkey=[a-zA-Z0-9]+/);
                return `${baseUrl}?raw=1${rlkeyMatch ? `&${rlkeyMatch[0]}` : ''}`;
            }
            return direct;
        }

        function getOptimizedImageUrl(url) {
            const directUrl = getDirectDropboxUrl(url);
            if (!directUrl) return '';
            return `https://wsrv.nl/?url=${encodeURIComponent(directUrl)}&output=webp&q=80&w=1500`;
        }

        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            transformHeader: h => h.trim().toLowerCase(),
            complete: function (results) {
                portfolioData = results.data.filter(row => row.url && row.url.trim() !== '');
                filteredIndices = portfolioData.map((_, i) => i);

                buildFilters();
                renderGallery();
            }
        });

        function buildFilters() {
            const projects = new Set();
            const fields = new Set();
            const years = new Set();

            portfolioData.forEach(item => {
                if (item.project) projects.add(item.project.trim().toLowerCase());
                if (item.year) years.add(item.year.trim());
                if (item.field) fields.add(item.field.trim().toLowerCase());
                if (item['field opt']) fields.add(item['field opt'].trim().toLowerCase());
            });

            renderFilterGroup('project', projects);
            renderFilterGroup('field', fields);
            renderFilterGroup('year', years);
        }

        function renderFilterGroup(type, valuesSet) {
            const container = document.getElementById(`filter-row-${type}`);

            const sortedValues = Array.from(valuesSet).sort((a, b) => {
                if (type === 'project') {
                    let indexA = projectOrder.indexOf(a);
                    let indexB = projectOrder.indexOf(b);
                    if (indexA === -1) indexA = 999;
                    if (indexB === -1) indexB = 999;
                    return indexA - indexB;
                } else if (type === 'field') {
                    let indexA = fieldOrder.indexOf(a);
                    let indexB = fieldOrder.indexOf(b);
                    if (indexA === -1) indexA = 999;
                    if (indexB === -1) indexB = 999;
                    return indexA - indexB;
                }
                return b.localeCompare(a);
            });

            sortedValues.forEach(val => {
                if (!val) return;
                const btn = document.createElement('button');
                btn.className = 'filter-tag';

                btn.dataset.val = val;
                btn.innerText = getDisplayName(val);

                if (type === 'field' && fieldColors[val]) {
                    btn.style.backgroundColor = fieldColors[val];
                }

                btn.onclick = () => toggleFilter(type, val, btn);
                container.appendChild(btn);
            });
        }

        function toggleFilter(type, val) {
            if (activeFilters[type].has(val)) {
                activeFilters[type].delete(val);
            } else {
                activeFilters[type].add(val);
            }
            applyFilters();
            updateFilterButtonsUI();
        }

        function setFilterExclusive(type, val) {
            activeFilters.project.clear();
            activeFilters.field.clear();
            activeFilters.year.clear();
            activeFilters[type].add(val);
            applyFilters();
            updateFilterButtonsUI();

            closeModal();
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const filtersBtn = document.getElementById('filters-toggle');
            const filtersWrapper = document.getElementById('filters-wrapper');
            const aboutBtn = document.getElementById('about-toggle');
            const aboutWrapper = document.getElementById('about-wrapper');

            if (!filtersBtn.classList.contains('open')) {
                filtersBtn.classList.add('open');
                filtersWrapper.classList.add('open');
                aboutBtn.classList.remove('open');
                aboutWrapper.classList.remove('open');
            }
        }

        function updateFilterButtonsUI() {
            ['project', 'field', 'year'].forEach(type => {
                const container = document.getElementById(`filter-row-${type}`);
                const buttons = container.querySelectorAll('.filter-tag');
                buttons.forEach(btn => {
                    const rawVal = btn.dataset.val;
                    if (activeFilters[type].has(rawVal)) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            });
        }

        function applyFilters() {
            filteredIndices = [];
            portfolioData.forEach((item, index) => {
                const p = item.project ? item.project.trim().toLowerCase() : 'others';
                const y = item.year ? item.year.trim() : '';
                const f1 = item.field ? item.field.trim().toLowerCase() : '';
                const f2 = item['field opt'] ? item['field opt'].trim().toLowerCase() : '';

                const passProject = activeFilters.project.size === 0 || activeFilters.project.has(p);
                const passYear = activeFilters.year.size === 0 || activeFilters.year.has(y);

                let passField = activeFilters.field.size === 0;
                if (!passField && (activeFilters.field.has(f1) || activeFilters.field.has(f2))) {
                    passField = true;
                }

                if (passProject && passYear && passField) {
                    filteredIndices.push(index);
                }
            });
            renderGallery();
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            if (filteredIndices.length === 0) {
                gallery.innerHTML = '<div style="text-align:center; color:var(--color-black); font-size:var(--text-size);">Nothing found.</div>';
                return;
            }

            const groupedProjects = {};

            filteredIndices.forEach((originalIndex) => {
                const item = portfolioData[originalIndex];
                const projectName = item.project ? item.project.trim() : 'others';
                if (!groupedProjects[projectName]) groupedProjects[projectName] = [];
                groupedProjects[projectName].push({ item, index: originalIndex });
            });

            const sortedProjectNames = Object.keys(groupedProjects).sort((a, b) => {
                let indexA = projectOrder.indexOf(a);
                let indexB = projectOrder.indexOf(b);
                if (indexA === -1) indexA = 999;
                if (indexB === -1) indexB = 999;
                return indexA - indexB;
            });

            sortedProjectNames.forEach(projectName => {
                const projectWrapper = document.createElement('div');
                projectWrapper.className = 'project-wrapper';

                const sectionHeader = document.createElement('h2');
                sectionHeader.className = 'project-header';
                sectionHeader.innerText = getDisplayName(projectName);
                projectWrapper.appendChild(sectionHeader);

                const projectGrid = document.createElement('div');
                projectGrid.className = 'project-grid';

                groupedProjects[projectName].sort((a, b) => {
                    const yearA = parseInt(a.item.year) || 0;
                    const yearB = parseInt(b.item.year) || 0;
                    return yearB - yearA;
                });

                groupedProjects[projectName].forEach(dataObj => {
                    const item = dataObj.item;
                    const isVideo = item.type && item.type.toLowerCase().trim() === 'vid';

                    const directUrl = getDirectDropboxUrl(item.url);
                    const optimizedImgUrl = isVideo ? '' : getOptimizedImageUrl(item.url);

                    const card = document.createElement('div');
                    card.className = 'thumb-card';
                    card.onclick = () => openModal(dataObj.index);

                    let mediaHTML = isVideo
                        ? `<video src="${directUrl}#t=0.1" preload="metadata" muted loop playsinline webkit-playsinline onmouseover="this.play()" onmouseout="this.pause()"></video><div class="video-icon"></div>`
                        : `<img src="${optimizedImgUrl}" loading="lazy" decoding="async">`;

                    card.innerHTML = `<div class="thumb-media-wrapper">${mediaHTML}</div>`;
                    projectGrid.appendChild(card);
                });

                projectWrapper.appendChild(projectGrid);
                gallery.appendChild(projectWrapper);
            });
        }

        function preloadMedia(index) {
            if (index < 0 || index >= filteredIndices.length) return;
            const item = portfolioData[filteredIndices[index]];
            const isVideo = item.type && item.type.toLowerCase().trim() === 'vid';

            if (!isVideo) {
                const img = new Image();
                img.src = getOptimizedImageUrl(item.url);
            } else {
                const vid = document.createElement('video');
                vid.preload = 'metadata';
                vid.src = getDirectDropboxUrl(item.url);
            }
        }

        function openModal(originalIndex) {
            currentModalIndex = filteredIndices.indexOf(originalIndex);

            const item = portfolioData[originalIndex];
            const isVideo = item.type && item.type.toLowerCase().trim() === 'vid';

            const directUrl = getDirectDropboxUrl(item.url);
            const optimizedImgUrl = isVideo ? '' : getOptimizedImageUrl(item.url);

            const mediaContainer = document.getElementById('media-content-container');

            mediaContainer.innerHTML = isVideo
                ? `<video src="${directUrl}" controls autoplay playsinline webkit-playsinline muted></video>`
                : `<img src="${optimizedImgUrl}" decoding="async">`;

            const nextIndex = currentModalIndex + 1 >= filteredIndices.length ? 0 : currentModalIndex + 1;
            const prevIndex = currentModalIndex - 1 < 0 ? filteredIndices.length - 1 : currentModalIndex - 1;
            preloadMedia(nextIndex);
            preloadMedia(prevIndex);

            const tagsContainer = document.getElementById('modal-tags');
            tagsContainer.innerHTML = '';

            const tags = [
                { text: item.project, type: 'project', color: false },
                { text: item.field, type: 'field', color: true },
                { text: item['field opt'], type: 'field', color: true },
                { text: item.year, type: 'year', color: false }
            ];

            tags.forEach(t => {
                if (t.text && t.text.trim() !== '') {
                    const cleanText = t.text.toLowerCase().trim();
                    const span = document.createElement('span');
                    span.className = 'filter-tag';
                    span.innerText = getDisplayName(cleanText);

                    if (t.color && fieldColors[cleanText]) {
                        span.style.backgroundColor = fieldColors[cleanText];
                    }

                    span.onclick = (e) => {
                        e.stopPropagation();
                        setFilterExclusive(t.type, cleanText);
                    };
                    tagsContainer.appendChild(span);
                }
            });

            const navButtons = document.querySelectorAll('.nav-btn');
            navButtons.forEach(btn => btn.style.display = filteredIndices.length > 1 ? 'flex' : 'none');

            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function navigateModal(direction, event) {
            event.stopPropagation();
            currentModalIndex += direction;

            if (currentModalIndex < 0) currentModalIndex = filteredIndices.length - 1;
            if (currentModalIndex >= filteredIndices.length) currentModalIndex = 0;

            openModal(filteredIndices[currentModalIndex]);
        }

        function closeModal(event) {
            if (event) {
                const target = event.target;
                if (target.closest('img') || target.closest('video')) return;
                if (target.closest('.nav-area')) return;
                if (target.closest('.tags-container')) return;
            }

            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';

            setTimeout(() => {
                document.getElementById('media-content-container').innerHTML = '';
            }, 300);
        }

        function toggleContactPopup(event) {
            if (event) event.stopPropagation();

            const popup = document.getElementById('contact-popup');
            const btn = document.querySelector('.header-plus-btn');

            if (popup.classList.contains('active')) {
                popup.classList.remove('active');
            } else {
                document.getElementById('filters-toggle').classList.remove('open');
                document.getElementById('filters-wrapper').classList.remove('open');
                document.getElementById('about-toggle').classList.remove('open');
                document.getElementById('about-wrapper').classList.remove('open');

                const rect = btn.getBoundingClientRect();
                popup.style.top = (rect.bottom + 30) + 'px';
                popup.style.right = (document.documentElement.clientWidth - rect.right) + 'px';

                popup.classList.add('active');
            }
        }

        window.addEventListener('resize', () => {
            const popup = document.getElementById('contact-popup');
            if (popup && popup.classList.contains('active')) {
                const btn = document.querySelector('.header-plus-btn');
                const rect = btn.getBoundingClientRect();
                popup.style.top = (rect.bottom + 30) + 'px';
                popup.style.right = (document.documentElement.clientWidth - rect.right) + 'px';
            }
        });

        function closeContactPopup(event) {
            if (event) event.stopPropagation();
            document.getElementById('contact-popup').classList.remove('active');
        }
    </script>
</body>

</html>
