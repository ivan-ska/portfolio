<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Directory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ========================================= */
        /*       DESIGN SYSTEM (ДИЗАЙН СИСТЕМА)      */
        /* ========================================= */
        
        :root {
            /* Цвета */
            --color-black: #000000;
            --color-white: #FFFFFF;
            --color-translucent-w: rgba(255, 255, 255, 0.7);
            --color-active: rgba(0, 0, 0, 0.07);
            --color-inactive: rgba(0, 0, 0, 0.4);
        
            /* Эффекты */
            --b-blur: blur(40px);
        
            /* Скругления */
            --r-small: 2px;
            --r-large: 4px;
        
            /* Типографика - Desktop Default */
            --font-family: 'DM Mono', monospace;
            --font-weight: 400;
            
            --h2-size: 20px;
            --h2-line-height: 1.2;
            --h2-letter-spacing: -0.03em;
            
            --h3-size: 16px;
            --h3-line-height: 1.2;
            --h3-letter-spacing: -0.03em;
            
            --text-size: 12px;
            --text-line-height: 1.2;
            --text-letter-spacing: -0.02em;
        
            /* Иконки */
            --icon-arrow-project-left: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-left-d.svg');
            --icon-arrow-project-right: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-right-d.svg');
            --icon-cross-large: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/cross-large-d.svg');
            --icon-play: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/play-d.svg');
        }
        
        /* --- АДАПТИВ ДИЗАЙН-СИСТЕМЫ (Mobile Overrides) --- */
        @media (max-width: 600px) {
            :root {
                --h2-size: 18px;
                --h3-size: 14px;
                
                --icon-arrow-project-left: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-left-m.svg');
                --icon-arrow-project-right: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-right-m.svg');
                --icon-cross-large: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/cross-large-m.svg');
                --icon-play: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/play-m.svg');
            }
        }

        /* Управление инлайновыми SVG версиями (Desktop/Mobile) */
        .icon-desktop { display: block; }
        .icon-mobile { display: none; }
        
        @media (max-width: 600px) {
            .icon-desktop { display: none; }
            .icon-mobile { display: block; }
        }

        /* ========================================= */
        /*                  БАЗА                     */
        /* ========================================= */
        body {
            margin: 0;
            background-color: var(--color-white);
            font-family: var(--font-family);
            font-weight: var(--font-weight);
            color: var(--color-black);
            -webkit-font-smoothing: antialiased;
            padding: 120px 0; 
        }

        /* --- ФЕЙКОВЫЙ ЭКРАН ЗАГРУЗКИ --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--color-white);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .loading-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; 
            padding: 20px 40px; 
            background-color: var(--color-active);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
            border-radius: var(--r-large);
        }

        .loading-badge-text {
            font-family: var(--font-family);
            font-weight: var(--font-weight);
            font-size: var(--h3-size);
            line-height: var(--h3-line-height);
            letter-spacing: var(--h3-letter-spacing);
            color: var(--color-black);
            margin: 0;
        }

        .loading-dot {
            fill-opacity: 0.07;
            animation: dot-pulse 1.5s infinite;
        }
        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.5s; }
        .loading-dot:nth-child(3) { animation-delay: 1s; }

        @keyframes dot-pulse {
            0%, 15% { fill-opacity: 1; }
            30%, 100% { fill-opacity: 0.07; }
        }

        /* ОБЕРТКА ШАПКИ */
        .header-wrapper {
            position: fixed;
            top: -500px; 
            left: 0; right: 0;
            padding-top: 500px; 
            z-index: 50;
            
            background-color: var(--color-translucent-w);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
            transform: translateZ(0); 
        }

        header {
            padding: calc(20px + env(safe-area-inset-top, 0px)) 40px 20px 40px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-nav {
            display: flex;
            gap: 24px;
        }

        .nav-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            
            font-family: var(--font-family);
            font-weight: var(--font-weight); 
            font-size: var(--h3-size);
            line-height: var(--h3-line-height);
            letter-spacing: var(--h3-letter-spacing);
            color: var(--color-inactive);
        }

        .nav-toggle:hover { opacity: 0.8; }

        /* Анимация плюса в минус */
        .toggle-svg {
            color: var(--color-inactive);
            transition: transform 0.2s ease; /* Вращение */
        }
        .toggle-vertical {
            transition: opacity 0.2s ease; /* Растворение */
        }

        .nav-toggle.open .toggle-svg {
            transform: rotate(180deg);
        }
        .nav-toggle.open .toggle-vertical {
            opacity: 0;
        }

        /* Кнопка + (вызывает модалку) */
        .header-plus-btn {
            padding: 9px;
            border-radius: var(--r-small);
            background-color: var(--color-active);
            border: none;
            cursor: pointer;
            color: var(--color-black);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* Слой активного цвета при наведении (доп 7% черного) */
        .header-plus-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background-color: var(--color-active);
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .header-plus-btn:hover::after {
            opacity: 1;
        }

        /* ПЛАВНЫЕ КОНТЕЙНЕРЫ (Filters & About) - CSS Grid анимация */
        .dropdown-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.2s ease, opacity 0.2s ease;
            opacity: 0;
            visibility: hidden;
        }

        .dropdown-wrapper.open {
            grid-template-rows: 1fr;
            opacity: 1;
            visibility: visible;
        }

        .dropdown-container {
            overflow: hidden;
        }

        .dropdown-inner {
            padding: 0 40px 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-label {
            font-size: var(--text-size);
            line-height: var(--text-line-height);
            letter-spacing: var(--text-letter-spacing);
            color: var(--color-inactive);
            margin-right: 4px;
        }

        /* button-small: Теги и ссылки */
        .filter-tag {
            background-color: var(--color-active);
            border: 1px solid transparent;
            padding: 4px 8px; /* Паддинги: 4px вертикаль, 8px горизонталь */
            border-radius: var(--r-small); /* Скругление 2px */
            
            font-size: var(--text-size);
            line-height: var(--text-line-height);
            letter-spacing: var(--text-letter-spacing);
            color: var(--color-black);
            
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none; 
            
            display: inline-flex;
            align-items: center;
            gap: 4px; 
            position: relative; /* Для псевдоэлемента с фоном */
        }

        /* Эффект ховера (дополнительные 7% черного) */
        .filter-tag::after {
            content: '';
            position: absolute;
            inset: 0;
            background-color: var(--color-active);
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .filter-tag:hover::after { opacity: 1; }
        
        .filter-tag.active {
            background-color: var(--color-black) !important;
            color: var(--color-white) !important;
        }

        /* АНИМАЦИЯ СТРЕЛОЧКИ ССЫЛОК */
        .arrow-diag, .arrow-corn {
            transition: d 0.2s ease-out; 
        }
        .filter-tag:hover .arrow-diag { d: path("M9 3L3 9"); }
        .filter-tag:hover .arrow-corn { d: path("M9 10L9 3L2 3"); }

        .about-text {
            margin: 0;
            font-size: var(--text-size);
            line-height: var(--text-line-height);
            letter-spacing: var(--text-letter-spacing);
            color: var(--color-inactive);
            max-width: 600px; 
        }

        .about-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        /* ГАЛЕРЕЯ */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 80px; 
            padding: 0 40px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .loader {
            display: flex;
            justify-content: center;
            margin: 0 auto;
            color: var(--color-inactive);
        }

        .project-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px; 
        }

        .project-header {
            margin: 0;
            font-size: var(--h2-size);
            line-height: var(--h2-line-height);
            letter-spacing: var(--h2-letter-spacing);
            color: var(--color-inactive);
            font-weight: var(--font-weight); 
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        .thumb-card {
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            container-type: size;
        }

        .thumb-media-wrapper {
            padding: 8px; 
            background-color: transparent;
            border-radius: var(--r-large); 
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
        }

        .thumb-card:hover .thumb-media-wrapper {
            transform: translateY(-4px);
            background-color: var(--color-active); 
        }

        .thumb-media-wrapper img, 
        .thumb-media-wrapper video {
            max-width: calc(100cqw - 16px);
            max-height: calc(100cqh - 16px);
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: var(--r-small); 
            display: block;
        }

        .video-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--color-translucent-w);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
            border-radius: 50%;
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; 
        }

        .video-icon::after {
            content: '';
            display: block;
            width: 24px; height: 24px;
            background-color: var(--color-inactive);
            -webkit-mask: var(--icon-play) center/contain no-repeat;
            mask: var(--icon-play) center/contain no-repeat;
        }

        /* ВСПЛЫВАЮЩЕЕ ОКНО (МОДАЛКА) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--color-translucent-w);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box; 
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--color-white);
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            border-radius: var(--r-large);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .close-btn {
            position: absolute;
            top: 16px; right: 16px;
            width: 32px; height: 32px;
            background-image: var(--icon-cross-large);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        .modal-media {
            width: 100%;
            background: transparent;
            display: flex;
            justify-content: center;
            position: relative; 
        }

        .modal-media img,
        .modal-media video {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px; height: 40px;
            background-color: transparent;
            border: none;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .nav-btn:hover { transform: translateY(-50%) scale(1.05); }
        .nav-btn.prev { left: 16px; background-image: var(--icon-arrow-project-left); }
        .nav-btn.next { right: 16px; background-image: var(--icon-arrow-project-right); }

        .modal-info { padding: 24px; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 6px; }

        /* АДАПТИВ */
        @media (max-width: 600px) {
            .loading-badge { gap: 8px; }

            header { padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 20px 20px; }
            .header-nav { gap: 16px; }
            .header-plus-btn { padding: 8px; }

            .dropdown-inner { padding: 0 20px 20px 20px; }
            .gallery { padding: 0 20px; }
            
            .project-grid { 
                grid-template-columns: 1fr 1fr; 
                gap: 8px; 
            }

            .thumb-media-wrapper { padding: 6px; }
            .thumb-media-wrapper img, 
            .thumb-media-wrapper video {
                max-width: calc(100cqw - 12px);
                max-height: calc(100cqh - 12px);
            }

            .video-icon { padding: 13px; }
            .video-icon::after { width: 20px; height: 20px; }

            .nav-btn { width: 32px; height: 32px; }
            .nav-btn.prev { left: 8px; }
            .nav-btn.next { right: 8px; }
            
            .modal { 
                padding: 12px; 
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                background-color: var(--color-white);
            }
        }
    </style>
</head>

<body>

    <div id="loading-screen">
        <div class="loading-badge">
            <h3 class="loading-badge-text">Loading</h3>
            <svg class="icon-desktop" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle class="loading-dot" cx="2" cy="8" r="1.5" fill="currentColor"/>
                <circle class="loading-dot" cx="8" cy="8" r="1.5" fill="currentColor"/>
                <circle class="loading-dot" cx="14" cy="8" r="1.5" fill="currentColor"/>
            </svg>
            <svg class="icon-mobile" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle class="loading-dot" cx="1.75" cy="7" r="1.25" fill="currentColor"/>
                <circle class="loading-dot" cx="7" cy="7" r="1.25" fill="currentColor"/>
                <circle class="loading-dot" cx="12.25" cy="7" r="1.25" fill="currentColor"/>
            </svg>
        </div>
    </div>

    <div class="header-wrapper">
        <header>
            <div class="header-nav">
                <!-- Кнопка Filters -->
                <button id="filters-toggle" class="nav-toggle" onclick="toggleMenu('filters', event)">
                    Filters 
                    <svg class="toggle-svg icon-desktop" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path class="toggle-vertical" d="M7 2V12" stroke="currentColor" stroke-width="1.2"/>
                        <path class="toggle-horizontal" d="M2 7L12 7" stroke="currentColor" stroke-width="1.2"/>
                    </svg>
                    <svg class="toggle-svg icon-mobile" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path class="toggle-vertical" d="M6 2V10" stroke="currentColor"/>
                        <path class="toggle-horizontal" d="M2 6L10 6" stroke="currentColor"/>
                    </svg>
                </button>
                
                <!-- Кнопка About -->
                <button id="about-toggle" class="nav-toggle" onclick="toggleMenu('about', event)">
                    About
                    <svg class="toggle-svg icon-desktop" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path class="toggle-vertical" d="M7 2V12" stroke="currentColor" stroke-width="1.2"/>
                        <path class="toggle-horizontal" d="M2 7L12 7" stroke="currentColor" stroke-width="1.2"/>
                    </svg>
                    <svg class="toggle-svg icon-mobile" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path class="toggle-vertical" d="M6 2V10" stroke="currentColor"/>
                        <path class="toggle-horizontal" d="M2 6L10 6" stroke="currentColor"/>
                    </svg>
                </button>
            </div>

            <!-- Новая Кнопка Плюс (Пока без функционала, можно добавить onClick) -->
            <button class="header-plus-btn">
                <svg class="icon-desktop" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 2V12" stroke="currentColor" stroke-width="1.2"/>
                    <path d="M2 7L12 7" stroke="currentColor" stroke-width="1.2"/>
                </svg>
                <svg class="icon-mobile" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 2V10" stroke="currentColor"/>
                    <path d="M2 6L10 6" stroke="currentColor"/>
                </svg>
            </button>
        </header>

        <!-- Плавные контейнеры (Wrapper -> Container -> Inner) -->
        <div class="dropdown-wrapper" id="about-wrapper">
            <div class="dropdown-container">
                <div class="dropdown-inner">
                    <p class="about-text">
                        Hi! I am a digital designer. Here is a selection of my recent works.
                    </p>
                    <div class="about-buttons">
                        <a href="#" target="_blank" class="filter-tag">
                            <svg class="arrow-link-svg" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path class="arrow-diag" d="M10 2L2 10" stroke="currentColor"/>
                                <path class="arrow-corn" d="M10 9L10 2L3 2" stroke="currentColor"/>
                            </svg>
                            CV
                        </a>
                        <a href="mailto:hello@example.com" class="filter-tag">
                            <svg class="arrow-link-svg" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path class="arrow-diag" d="M10 2L2 10" stroke="currentColor"/>
                                <path class="arrow-corn" d="M10 9L10 2L3 2" stroke="currentColor"/>
                            </svg>
                            Email
                        </a>
                        <a href="#" target="_blank" class="filter-tag">
                            <svg class="arrow-link-svg" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path class="arrow-diag" d="M10 2L2 10" stroke="currentColor"/>
                                <path class="arrow-corn" d="M10 9L10 2L3 2" stroke="currentColor"/>
                            </svg>
                            Telegram
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="dropdown-wrapper" id="filters-wrapper">
            <div class="dropdown-container">
                <div class="dropdown-inner">
                    <div class="filter-row" id="filter-row-project">
                        <span class="filter-label">Project:</span>
                    </div>
                    <div class="filter-row" id="filter-row-field">
                        <span class="filter-label">Field:</span>
                    </div>
                    <div class="filter-row" id="filter-row-year">
                        <span class="filter-label">Year:</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main class="gallery" id="gallery">
        <div class="loader">
            <svg class="icon-desktop" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle class="loading-dot" cx="2" cy="8" r="1.5" fill="currentColor"/>
                <circle class="loading-dot" cx="8" cy="8" r="1.5" fill="currentColor"/>
                <circle class="loading-dot" cx="14" cy="8" r="1.5" fill="currentColor"/>
            </svg>
            <svg class="icon-mobile" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle class="loading-dot" cx="1.75" cy="7" r="1.25" fill="currentColor"/>
                <circle class="loading-dot" cx="7" cy="7" r="1.25" fill="currentColor"/>
                <circle class="loading-dot" cx="12.25" cy="7" r="1.25" fill="currentColor"/>
            </svg>
        </div>
    </main>

    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal(event)"></button>
            
            <div class="modal-media" id="modal-media">
                <button class="nav-btn prev" onclick="navigateModal(-1, event)"></button>
                <div id="media-content-container"></div>
                <button class="nav-btn next" onclick="navigateModal(1, event)"></button>
            </div>
            
            <div class="modal-info">
                <div class="tags-container" id="modal-tags">
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    loader.style.pointerEvents = 'none';
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500); 
                }
            }, 3000); 
        });

        // ГЛОБАЛЬНЫЙ КЛИК: Закрытие меню шапки при клике в пустое место
        document.addEventListener('click', function(event) {
            const headerWrapper = document.querySelector('.header-wrapper');
            // Если кликнули не на элементы шапки, то скрываем меню
            if (!headerWrapper.contains(event.target)) {
                document.getElementById('filters-toggle').classList.remove('open');
                document.getElementById('filters-wrapper').classList.remove('open');
                document.getElementById('about-toggle').classList.remove('open');
                document.getElementById('about-wrapper').classList.remove('open');
            }
        });

        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtm-693Wc44CzQx_ASnwQanc45NuieQl6YkoYVavbQ2UBAyPrgxibzDzPoLkUo9cZpdd9RcsPHBsnI/pub?output=csv';

        const fieldColors = {
            'ui/ux': '#D0E4F2', 'web': '#D1EDF4', 'graphic design': '#D7EDE1',
            'digital ad': '#DDEDD7', 'outdoor ad': '#EDF7D3', 'social media': '#F7F1D3',
            'branding': '#FEF0D2', 'logo': '#FEE9D1', 'aso': '#FCE1D1',
            'icon': '#FEE1DD', 'presentation': '#F8DADD', 'merch': '#F5E1F2',
            'stickers': '#E7E3F2', 'motion design': '#DCE5F1'
        };

        let portfolioData = [];
        let filteredIndices =[]; 
        let currentModalIndex = 0; 

        let activeFilters = {
            project: new Set(),
            field: new Set(),
            year: new Set()
        };

        function toggleMenu(menuName, event) {
            if(event) event.stopPropagation(); // Не даем клику проброситься в document

            const filtersBtn = document.getElementById('filters-toggle');
            const filtersWrapper = document.getElementById('filters-wrapper');
            const aboutBtn = document.getElementById('about-toggle');
            const aboutWrapper = document.getElementById('about-wrapper');

            if (menuName === 'filters') {
                if (filtersBtn.classList.contains('open')) {
                    filtersBtn.classList.remove('open');
                    filtersWrapper.classList.remove('open');
                } else {
                    filtersBtn.classList.add('open');
                    filtersWrapper.classList.add('open');
                    aboutBtn.classList.remove('open');
                    aboutWrapper.classList.remove('open');
                }
            } else if (menuName === 'about') {
                if (aboutBtn.classList.contains('open')) {
                    aboutBtn.classList.remove('open');
                    aboutWrapper.classList.remove('open');
                } else {
                    aboutBtn.classList.add('open');
                    aboutWrapper.classList.add('open');
                    filtersBtn.classList.remove('open');
                    filtersWrapper.classList.remove('open');
                }
            }
        }

        function getDirectDropboxUrl(url) {
            if (!url) return '';
            let direct = url.trim();
            if (direct.includes('dropbox.com')) {
                const baseUrl = direct.split('?')[0];
                const rlkeyMatch = direct.match(/rlkey=[a-zA-Z0-9]+/);
                return `${baseUrl}?raw=1${rlkeyMatch ? `&${rlkeyMatch[0]}` : ''}`;
            }
            return direct;
        }

        function getOptimizedImageUrl(url) {
            const directUrl = getDirectDropboxUrl(url);
            if (!directUrl) return '';
            return `https://wsrv.nl/?url=${encodeURIComponent(directUrl)}&output=webp&q=80&w=1500`;
        }

        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            transformHeader: h => h.trim().toLowerCase(),
            complete: function (results) {
                portfolioData = results.data.filter(row => row.url && row.url.trim() !== ''); 
                filteredIndices = portfolioData.map((_, i) => i); 
                
                buildFilters();
                renderGallery();
            }
        });

        function buildFilters() {
            const projects = new Set();
            const fields = new Set();
            const years = new Set();

            portfolioData.forEach(item => {
                if (item.project) projects.add(item.project.trim().toLowerCase());
                if (item.year) years.add(item.year.trim());
                if (item.field) fields.add(item.field.trim().toLowerCase());
                if (item['field opt']) fields.add(item['field opt'].trim().toLowerCase());
            });

            renderFilterGroup('project', projects);
            renderFilterGroup('field', fields);
            renderFilterGroup('year', years);
        }

        function renderFilterGroup(type, valuesSet) {
            const container = document.getElementById(`filter-row-${type}`);
            const sortedValues = Array.from(valuesSet).sort();

            sortedValues.forEach(val => {
                if(!val) return;
                const btn = document.createElement('button');
                btn.className = 'filter-tag';
                btn.innerText = val;
                
                // ВАЖНО: Заливаем весь фон цветом ниши
                if (type === 'field' && fieldColors[val]) {
                    btn.style.backgroundColor = fieldColors[val];
                }

                btn.onclick = () => toggleFilter(type, val, btn);
                container.appendChild(btn);
            });
        }

        function toggleFilter(type, val) {
            if (activeFilters[type].has(val)) {
                activeFilters[type].delete(val);
            } else {
                activeFilters[type].add(val);
            }
            applyFilters();
            updateFilterButtonsUI();
        }

        function setFilterExclusive(type, val) {
            activeFilters.project.clear();
            activeFilters.field.clear();
            activeFilters.year.clear();
            activeFilters[type].add(val);
            applyFilters();
            updateFilterButtonsUI();
            
            closeModal();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateFilterButtonsUI() {['project', 'field', 'year'].forEach(type => {
                const container = document.getElementById(`filter-row-${type}`);
                const buttons = container.querySelectorAll('.filter-tag');
                buttons.forEach(btn => {
                    if (activeFilters[type].has(btn.innerText)) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            });
        }

        function applyFilters() {
            filteredIndices =[];
            portfolioData.forEach((item, index) => {
                const p = item.project ? item.project.trim().toLowerCase() : 'others';
                const y = item.year ? item.year.trim() : '';
                const f1 = item.field ? item.field.trim().toLowerCase() : '';
                const f2 = item['field opt'] ? item['field opt'].trim().toLowerCase() : '';

                const passProject = activeFilters.project.size === 0 || activeFilters.project.has(p);
                const passYear = activeFilters.year.size === 0 || activeFilters.year.has(y);
                
                let passField = activeFilters.field.size === 0;
                if (!passField && (activeFilters.field.has(f1) || activeFilters.field.has(f2))) {
                    passField = true;
                }

                if (passProject && passYear && passField) {
                    filteredIndices.push(index);
                }
            });
            renderGallery();
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            if (filteredIndices.length === 0) {
                gallery.innerHTML = '<div style="text-align:center; color:var(--color-inactive); font-size:var(--text-size);">Nothing found.</div>';
                return;
            }

            const groupedProjects = {};
            
            filteredIndices.forEach((originalIndex) => {
                const item = portfolioData[originalIndex];
                const projectName = item.project ? item.project.trim() : 'others';
                if (!groupedProjects[projectName]) groupedProjects[projectName] = [];
                groupedProjects[projectName].push({ item, index: originalIndex });
            });

            for (const projectName in groupedProjects) {
                const projectWrapper = document.createElement('div');
                projectWrapper.className = 'project-wrapper';

                const sectionHeader = document.createElement('h2');
                sectionHeader.className = 'project-header';
                sectionHeader.innerText = projectName.toLowerCase();
                projectWrapper.appendChild(sectionHeader);

                const projectGrid = document.createElement('div');
                projectGrid.className = 'project-grid';

                groupedProjects[projectName].forEach(dataObj => {
                    const item = dataObj.item;
                    const isVideo = item.type && item.type.toLowerCase().trim() === 'vid';
                    
                    const directUrl = getDirectDropboxUrl(item.url);
                    const optimizedImgUrl = isVideo ? '' : getOptimizedImageUrl(item.url);

                    const card = document.createElement('div');
                    card.className = 'thumb-card';
                    card.onclick = () => openModal(dataObj.index);
                    
                    let mediaHTML = isVideo 
                        ? `<video src="${directUrl}#t=0.1" preload="metadata" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video><div class="video-icon"></div>`
                        : `<img src="${optimizedImgUrl}" loading="lazy" decoding="async">`;

                    card.innerHTML = `<div class="thumb-media-wrapper">${mediaHTML}</div>`;
                    projectGrid.appendChild(card);
                });

                projectWrapper.appendChild(projectGrid);
                gallery.appendChild(projectWrapper);
            }
        }

        function preloadMedia(index) {
            if (index < 0 || index >= filteredIndices.length) return;
            const item = portfolioData[filteredIndices[index]];
            const isVideo = item.type && item.type.toLowerCase().trim() === 'vid';

            if (!isVideo) {
                const img = new Image();
                img.src = getOptimizedImageUrl(item.url);
            } else {
                const vid = document.createElement('video');
                vid.preload = 'metadata';
                vid.src = getDirectDropboxUrl(item.url);
            }
        }

        function openModal(originalIndex) {
            currentModalIndex = filteredIndices.indexOf(originalIndex);
            
            const item = portfolioData[originalIndex];
            const isVideo = item.type && item.type.toLowerCase().trim() === 'vid';

            const directUrl = getDirectDropboxUrl(item.url);
            const optimizedImgUrl = isVideo ? '' : getOptimizedImageUrl(item.url);

            const mediaContainer = document.getElementById('media-content-container');
            
            mediaContainer.innerHTML = isVideo 
                ? `<video src="${directUrl}" controls autoplay playsinline></video>` 
                : `<img src="${optimizedImgUrl}" decoding="async">`;

            const nextIndex = currentModalIndex + 1 >= filteredIndices.length ? 0 : currentModalIndex + 1;
            const prevIndex = currentModalIndex - 1 < 0 ? filteredIndices.length - 1 : currentModalIndex - 1;
            preloadMedia(nextIndex);
            preloadMedia(prevIndex);

            const tagsContainer = document.getElementById('modal-tags');
            tagsContainer.innerHTML = '';

            const tags =[
                { text: item.project, type: 'project', color: false },
                { text: item.field, type: 'field', color: true },
                { text: item['field opt'], type: 'field', color: true },
                { text: item.year, type: 'year', color: false }
            ];

            tags.forEach(t => {
                if (t.text && t.text.trim() !== '') {
                    const cleanText = t.text.toLowerCase().trim();
                    const span = document.createElement('span');
                    span.className = 'filter-tag';
                    span.innerText = cleanText;
                    
                    if (t.color && fieldColors[cleanText]) {
                        span.style.backgroundColor = fieldColors[cleanText];
                    }

                    span.onclick = () => setFilterExclusive(t.type, cleanText);
                    tagsContainer.appendChild(span);
                }
            });

            const navButtons = document.querySelectorAll('.nav-btn');
            navButtons.forEach(btn => btn.style.display = filteredIndices.length > 1 ? 'flex' : 'none');

            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function navigateModal(direction, event) {
            event.stopPropagation(); 
            currentModalIndex += direction;
            
            if (currentModalIndex < 0) currentModalIndex = filteredIndices.length - 1;
            if (currentModalIndex >= filteredIndices.length) currentModalIndex = 0;
            
            openModal(filteredIndices[currentModalIndex]);
        }

        function closeModal(event) {
            if (event && event.target.closest('.modal-content') && !event.target.classList.contains('close-btn')) {
                return;
            }
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('media-content-container').innerHTML = '';
        }
    </script>
</body>

</html>
