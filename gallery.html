<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Directory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ========================================= */
        /*       DESIGN SYSTEM (ДИЗАЙН СИСТЕМА)      */
        /* ========================================= */
        
        :root {
            /* Цвета */
            --color-black: #000000;
            --color-white: #FFFFFF;
            --color-translucent-w: rgba(255, 255, 255, 0.7);
            --color-active: rgba(0, 0, 0, 0.07);
            --color-inactive: rgba(0, 0, 0, 0.4);
        
            /* Эффекты */
            --b-blur: blur(40px);
        
            /* Скругления */
            --r-small: 2px;
            --r-large: 4px;
        
            /* Типографика - Desktop Default */
            --font-family: 'DM Mono', monospace;
            --font-weight: 400;
            
            --h2-size: 20px;
            --h2-line-height: 1.2;
            --h2-letter-spacing: -0.03em;
            
            --h3-size: 16px;
            --h3-line-height: 1.2;
            --h3-letter-spacing: -0.03em;
            
            --text-size: 12px;
            --text-line-height: 1.2;
            --text-letter-spacing: -0.02em;
        
            /* Иконки - Desktop Default */
            --icon-arrow-link: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-link.svg');
            --icon-arrow-project-left: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-left-d.svg');
            --icon-arrow-project-right: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-right-d.svg');
            --icon-cross-large: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/cross-large-d.svg');
            --icon-cross-small: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/cross-small-d.svg');
            --icon-loading: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/loading-d.svg');
            --icon-logo: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/logo-d.svg');
            --icon-minus: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/minus-d.svg');
            --icon-play: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/play-d.svg');
            --icon-plus: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/plus-d.svg');
        }
        
        /* --- АДАПТИВ ДИЗАЙН-СИСТЕМЫ (Mobile Overrides) --- */
        @media (max-width: 600px) {
            :root {
                --h2-size: 18px;
                --h3-size: 14px;
                
                --icon-arrow-project-left: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-left-m.svg');
                --icon-arrow-project-right: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/arrow-project-right-m.svg');
                --icon-cross-large: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/cross-large-m.svg');
                --icon-cross-small: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/cross-small-m.svg');
                --icon-loading: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/loading-m.svg');
                --icon-logo: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/logo-m.svg');
                --icon-minus: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/minus-m.svg');
                --icon-play: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/play-m.svg');
                --icon-plus: url('https://raw.githubusercontent.com/ivan-ska/portfolio/c6dfe764cddcc7e3cb2316ec28d2dac1b3317be7/gallery/icons/plus-m.svg');
            }
        }

        /* ========================================= */
        /*                  БАЗА                     */
        /* ========================================= */
        body {
            margin: 0;
            background-color: var(--color-white);
            font-family: var(--font-family);
            font-weight: var(--font-weight);
            color: var(--color-black);
            -webkit-font-smoothing: antialiased;
            padding: 120px 0; /* Отступы 120px сверху и снизу у всего документа */
        }

        /* ОБЕРТКА ШАПКИ (Фикс сверху с эффектом бесконечности вверх) */
        .header-wrapper {
            position: fixed;
            top: -100px; /* Сдвигаем на 100px вверх */
            left: 0; 
            right: 0;
            padding-top: 100px; /* Компенсируем сдвиг, чтобы закрыть "резинку" Safari */
            z-index: 50;
            background-color: var(--color-translucent-w);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
        }

        header {
            /* Отступы шапки: учитываем челку iPhone (safe-area) + 20px сверху и снизу */
            padding: calc(20px + env(safe-area-inset-top, 0px)) 40px 20px 40px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            height: 32px; 
            width: 150px;
            background-image: var(--icon-logo);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: left center;
        }

        /* Кнопка фильтров в шапке */
        .filters-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            
            font-family: var(--font-family);
            font-weight: var(--font-weight);
            font-size: var(--text-size);
            line-height: var(--text-line-height);
            letter-spacing: var(--text-letter-spacing);
            color: var(--color-inactive);
        }

        .filters-toggle:hover {
            opacity: 0.8;
        }

        /* Иконка плюса/минуса через маску, чтобы задать ей цвет inactive */
        .toggle-icon {
            width: 16px;
            height: 16px;
            background-color: var(--color-inactive);
            -webkit-mask: var(--icon-plus) center/contain no-repeat;
            mask: var(--icon-plus) center/contain no-repeat;
        }

        .filters-toggle.open .toggle-icon {
            -webkit-mask: var(--icon-minus) center/contain no-repeat;
            mask: var(--icon-minus) center/contain no-repeat;
        }

        /* ФИЛЬТРЫ (Выпадают из шапки) */
        .filters-container {
            padding: 0 40px 20px 40px; /* Паддинги по бокам равны паддингам сетки */
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-label {
            font-size: var(--text-size);
            line-height: var(--text-line-height);
            letter-spacing: var(--text-letter-spacing);
            color: var(--color-inactive);
            margin-right: 4px;
        }

        .filter-tag {
            background: var(--color-active);
            border: 1px solid transparent;
            padding: 4px 10px;
            border-radius: var(--r-small);
            
            font-size: var(--text-size);
            line-height: var(--text-line-height);
            letter-spacing: var(--text-letter-spacing);
            color: var(--color-black);
            
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-tag:hover {
            opacity: 0.8;
        }

        .filter-tag.active {
            background: var(--color-black) !important;
            color: var(--color-white) !important;
        }

        /* ГАЛЕРЕЯ (Контейнер проектов) */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 80px; /* Отступ 80px между проектами */
            padding: 0 40px; /* Отступы по краям экрана */
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Обертка отдельного проекта */
        .project-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px; /* Отступ 20px между названием (h2) и сеткой */
        }

        .project-header {
            margin: 0;
            font-size: var(--h2-size);
            line-height: var(--h2-line-height);
            letter-spacing: var(--h2-letter-spacing);
            color: var(--color-inactive);
        }

        /* Сама сетка карточек внутри проекта */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        /* КАРТОЧКА И ОБЕРТКА */
        .thumb-card {
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            container-type: size;
        }

        .thumb-media-wrapper {
            padding: 8px; /* Десктопный паддинг обертки 8px */
            background-color: transparent;
            border-radius: var(--r-large); 
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
        }

        .thumb-card:hover .thumb-media-wrapper {
            transform: translateY(-4px);
            background-color: var(--color-active); 
        }

        .thumb-media-wrapper img, 
        .thumb-media-wrapper video {
            /* Вычитаем 16px (8px + 8px паддинги) */
            max-width: calc(100cqw - 16px);
            max-height: calc(100cqh - 16px);
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: var(--r-small); 
            display: block;
        }

        /* Иконка Play для видео по центру */
        .video-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--color-translucent-w);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
            border-radius: 50%;
            padding: 20px; /* Отступы 20px вокруг иконки на десктопе */
            
            display: flex;
            justify-content: center;
            align-items: center;
            /* Не блокирует hover на видео */
            pointer-events: none; 
        }

        /* Рисуем SVG маской, чтобы закрасить в inactive */
        .video-icon::after {
            content: '';
            display: block;
            width: 24px;
            height: 24px;
            background-color: var(--color-inactive);
            -webkit-mask: var(--icon-play) center/contain no-repeat;
            mask: var(--icon-play) center/contain no-repeat;
        }

        /* ВСПЛЫВАЮЩЕЕ ОКНО (МОДАЛКА) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            
            background-color: var(--color-translucent-w);
            backdrop-filter: var(--b-blur);
            -webkit-backdrop-filter: var(--b-blur);
            
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box; 
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--color-white);
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            border-radius: var(--r-large);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .close-btn {
            position: absolute;
            top: 16px; right: 16px;
            width: 32px; height: 32px;
            background-image: var(--icon-cross-large);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        .modal-media {
            width: 100%;
            background: transparent;
            display: flex;
            justify-content: center;
            position: relative; 
        }

        .modal-media img,
        .modal-media video {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px; height: 40px;
            background-color: transparent;
            border: none;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .nav-btn:hover { transform: translateY(-50%) scale(1.05); }
        .nav-btn.prev { left: 16px; background-image: var(--icon-arrow-project-left); }
        .nav-btn.next { right: 16px; background-image: var(--icon-arrow-project-right); }

        .modal-info { padding: 24px; }

        .tags-container {
            display: flex; flex-wrap: wrap; gap: 6px;
        }

        .tag {
            background: var(--color-active);
            padding: 4px 10px;
            border-radius: var(--r-small);
            font-size: var(--text-size);
            line-height: var(--text-line-height);
            letter-spacing: var(--text-letter-spacing);
            color: var(--color-black);
            cursor: pointer; 
            transition: opacity 0.2s;
        }
        
        .tag:hover { opacity: 0.8; }

        .loader {
            width: 32px;
            height: 32px;
            margin: 0 auto;
            background-image: var(--icon-loading);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* АДАПТИВ */
        @media (max-width: 600px) {
            /* Отступы шапки и галереи 20px на мобилках */
            header { padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 20px 20px; }
            .filters-container { padding: 0 20px 20px 20px; }
            .gallery { padding: 0 20px; }
            
            .project-grid { 
                grid-template-columns: 1fr 1fr; 
                gap: 8px; /* Мобильный гэп 8px */
            }

            .thumb-media-wrapper { padding: 6px; }
            .thumb-media-wrapper img, 
            .thumb-media-wrapper video {
                /* Вычитаем 12px (6px + 6px паддинги) */
                max-width: calc(100cqw - 12px);
                max-height: calc(100cqh - 12px);
            }

            /* Круглая кнопка видео на телефоне (паддинг 13) */
            .video-icon { padding: 13px; }
            .video-icon::after { width: 20px; height: 20px; }

            .nav-btn { width: 32px; height: 32px; }
            .nav-btn.prev { left: 8px; }
            .nav-btn.next { right: 8px; }
            
            .modal { 
                padding: 12px; 
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                background-color: var(--color-white);
            }
        }
    </style>
</head>

<body>

    <div class="header-wrapper">
        <header>
            <div class="logo"></div>
            <!-- Добавлена кнопка открытия фильтров -->
            <button id="filters-toggle" class="filters-toggle" onclick="toggleFiltersMenu()">
                Filters <span class="toggle-icon"></span>
            </button>
        </header>

        <div class="filters-container" id="filters-container" style="display: none;">
            <div class="filter-row" id="filter-row-project">
                <span class="filter-label">Project:</span>
            </div>
            <div class="filter-row" id="filter-row-field">
                <span class="filter-label">Field:</span>
            </div>
            <div class="filter-row" id="filter-row-year">
                <span class="filter-label">Year:</span>
            </div>
        </div>
    </div>

    <main class="gallery" id="gallery">
        <div class="loader"></div>
    </main>

    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal(event)"></button>
            
            <div class="modal-media" id="modal-media">
                <button class="nav-btn prev" onclick="navigateModal(-1, event)"></button>
                <div id="media-content-container"></div>
                <button class="nav-btn next" onclick="navigateModal(1, event)"></button>
            </div>
            
            <div class="modal-info">
                <div class="tags-container" id="modal-tags">
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtm-693Wc44CzQx_ASnwQanc45NuieQl6YkoYVavbQ2UBAyPrgxibzDzPoLkUo9cZpdd9RcsPHBsnI/pub?output=csv';

        const fieldColors = {
            'ui/ux': '#D0E4F2', 'web': '#D1EDF4', 'graphic design': '#D7EDE1',
            'digital ad': '#DDEDD7', 'outdoor ad': '#EDF7D3', 'social media': '#F7F1D3',
            'branding': '#FEF0D2', 'logo': '#FEE9D1', 'aso': '#FCE1D1',
            'icon': '#FEE1DD', 'presentation': '#F8DADD', 'merch': '#F5E1F2',
            'stickers': '#E7E3F2', 'motion design': '#DCE5F1'
        };

        let portfolioData = [];
        let filteredIndices =[]; 
        let currentModalIndex = 0; 

        let activeFilters = {
            project: new Set(),
            field: new Set(),
            year: new Set()
        };

        // Логика кнопки фильтров
        function toggleFiltersMenu() {
            const btn = document.getElementById('filters-toggle');
            const container = document.getElementById('filters-container');
            if (btn.classList.contains('open')) {
                btn.classList.remove('open');
                container.style.display = 'none';
            } else {
                btn.classList.add('open');
                container.style.display = 'flex';
            }
        }

        function getDirectDropboxUrl(url) {
            if (!url) return '';
            let direct = url.trim();
            if (direct.includes('dropbox.com')) {
                const baseUrl = direct.split('?')[0];
                const rlkeyMatch = direct.match(/rlkey=[a-zA-Z0-9]+/);
                return `${baseUrl}?raw=1${rlkeyMatch ? `&${rlkeyMatch[0]}` : ''}`;
            }
            return direct;
        }

        function getOptimizedImageUrl(url) {
            const directUrl = getDirectDropboxUrl(url);
            if (!directUrl) return '';
            return `https://wsrv.nl/?url=${encodeURIComponent(directUrl)}&output=webp&q=80&w=1500`;
        }

        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            transformHeader: h => h.trim().toLowerCase(),
            complete: function (results) {
                portfolioData = results.data.filter(row => row.url && row.url.trim() !== ''); 
                filteredIndices = portfolioData.map((_, i) => i); 
                
                buildFilters();
                renderGallery();
            }
        });

        function buildFilters() {
            const projects = new Set();
            const fields = new Set();
            const years = new Set();

            portfolioData.forEach(item => {
                if (item.project) projects.add(item.project.trim().toLowerCase());
                if (item.year) years.add(item.year.trim());
                if (item.field) fields.add(item.field.trim().toLowerCase());
                if (item['field opt']) fields.add(item['field opt'].trim().toLowerCase());
            });

            renderFilterGroup('project', projects);
            renderFilterGroup('field', fields);
            renderFilterGroup('year', years);
        }

        function renderFilterGroup(type, valuesSet) {
            const container = document.getElementById(`filter-row-${type}`);
            const sortedValues = Array.from(valuesSet).sort();

            sortedValues.forEach(val => {
                if(!val) return;
                const btn = document.createElement('button');
                btn.className = 'filter-tag';
                btn.innerText = val;
                
                if (type === 'field' && fieldColors[val]) {
                    btn.style.borderLeft = `4px solid ${fieldColors[val]}`;
                }

                btn.onclick = () => toggleFilter(type, val, btn);
                container.appendChild(btn);
            });
        }

        function toggleFilter(type, val) {
            if (activeFilters[type].has(val)) {
                activeFilters[type].delete(val);
            } else {
                activeFilters[type].add(val);
            }
            applyFilters();
            updateFilterButtonsUI();
        }

        function setFilterExclusive(type, val) {
            activeFilters.project.clear();
            activeFilters.field.clear();
            activeFilters.year.clear();
            activeFilters[type].add(val);
            applyFilters();
            updateFilterButtonsUI();
            
            closeModal();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateFilterButtonsUI() {
            ['project', 'field', 'year'].forEach(type => {
                const container = document.getElementById(`filter-row-${type}`);
                const buttons = container.querySelectorAll('.filter-tag');
                buttons.forEach(btn => {
                    if (activeFilters[type].has(btn.innerText)) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            });
        }

        function applyFilters() {
            filteredIndices =[];
            portfolioData.forEach((item, index) => {
                const p = item.project ? item.project.trim().toLowerCase() : 'others';
                const y = item.year ? item.year.trim() : '';
                const f1 = item.field ? item.field.trim().toLowerCase() : '';
                const f2 = item['field opt'] ? item['field opt'].trim().toLowerCase() : '';

                const passProject = activeFilters.project.size === 0 || activeFilters.project.has(p);
                const passYear = activeFilters.year.size === 0 || activeFilters.year.has(y);
                
                let passField = activeFilters.field.size === 0;
                if (!passField && (activeFilters.field.has(f1) || activeFilters.field.has(f2))) {
                    passField = true;
                }

                if (passProject && passYear && passField) {
                    filteredIndices.push(index);
                }
            });
            renderGallery();
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            if (filteredIndices.length === 0) {
                gallery.innerHTML = '<div style="text-align:center; color:var(--color-inactive); font-size:var(--text-size);">Nothing found.</div>';
                return;
            }

            const groupedProjects = {};
            
            filteredIndices.forEach((originalIndex) => {
                const item = portfolioData[originalIndex];
                const projectName = item.project ? item.project.trim() : 'others';
                if (!groupedProjects[projectName]) groupedProjects[projectName] =[];
                groupedProjects[projectName].push({ item, index: originalIndex });
            });

            // Обновленный рендер: теперь каждый проект обернут в свой div с отступами
            for (const projectName in groupedProjects) {
                const projectWrapper = document.createElement('div');
                projectWrapper.className = 'project-wrapper';

                const sectionHeader = document.createElement('h2');
                sectionHeader.className = 'project-header';
                sectionHeader.innerText = projectName.toLowerCase();
                projectWrapper.appendChild(sectionHeader);

                const projectGrid = document.createElement('div');
                projectGrid.className = 'project-grid';

                groupedProjects[projectName].forEach(dataObj => {
                    const item = dataObj.item;
                    const isVideo = item.type && item.type.toLowerCase().trim() === 'vid';
                    
                    const directUrl = getDirectDropboxUrl(item.url);
                    const optimizedImgUrl = isVideo ? '' : getOptimizedImageUrl(item.url);

                    const card = document.createElement('div');
                    card.className = 'thumb-card';
                    card.onclick = () => openModal(dataObj.index);
                    
                    let mediaHTML = isVideo 
                        ? `<video src="${directUrl}#t=0.1" preload="metadata" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video><div class="video-icon"></div>`
                        : `<img src="${optimizedImgUrl}" loading="lazy" decoding="async">`;

                    card.innerHTML = `<div class="thumb-media-wrapper">${mediaHTML}</div>`;
                    projectGrid.appendChild(card);
                });

                projectWrapper.appendChild(projectGrid);
                gallery.appendChild(projectWrapper);
            }
        }

        function preloadMedia(index) {
            if (index < 0 || index >= filteredIndices.length) return;
            const item = portfolioData[filteredIndices[index]];
            const isVideo = item.type && item.type.toLowerCase().trim() === 'vid';

            if (!isVideo) {
                const img = new Image();
                img.src = getOptimizedImageUrl(item.url);
            } else {
                const vid = document.createElement('video');
                vid.preload = 'metadata';
                vid.src = getDirectDropboxUrl(item.url);
            }
        }

        function openModal(originalIndex) {
            currentModalIndex = filteredIndices.indexOf(originalIndex);
            
            const item = portfolioData[originalIndex];
            const isVideo = item.type && item.type.toLowerCase().trim() === 'vid';

            const directUrl = getDirectDropboxUrl(item.url);
            const optimizedImgUrl = isVideo ? '' : getOptimizedImageUrl(item.url);

            const mediaContainer = document.getElementById('media-content-container');
            
            mediaContainer.innerHTML = isVideo 
                ? `<video src="${directUrl}" controls autoplay playsinline></video>` 
                : `<img src="${optimizedImgUrl}" decoding="async">`;

            const nextIndex = currentModalIndex + 1 >= filteredIndices.length ? 0 : currentModalIndex + 1;
            const prevIndex = currentModalIndex - 1 < 0 ? filteredIndices.length - 1 : currentModalIndex - 1;
            preloadMedia(nextIndex);
            preloadMedia(prevIndex);

            const tagsContainer = document.getElementById('modal-tags');
            tagsContainer.innerHTML = '';

            const tags =[
                { text: item.project, type: 'project', color: false },
                { text: item.field, type: 'field', color: true },
                { text: item['field opt'], type: 'field', color: true },
                { text: item.year, type: 'year', color: false }
            ];

            tags.forEach(t => {
                if (t.text && t.text.trim() !== '') {
                    const cleanText = t.text.toLowerCase().trim();
                    const span = document.createElement('span');
                    span.className = 'tag';
                    span.innerText = cleanText;
                    
                    if (t.color && fieldColors[cleanText]) {
                        span.style.backgroundColor = fieldColors[cleanText];
                    }

                    span.onclick = () => setFilterExclusive(t.type, cleanText);
                    tagsContainer.appendChild(span);
                }
            });

            const navButtons = document.querySelectorAll('.nav-btn');
            navButtons.forEach(btn => btn.style.display = filteredIndices.length > 1 ? 'flex' : 'none');

            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function navigateModal(direction, event) {
            event.stopPropagation(); 
            currentModalIndex += direction;
            
            if (currentModalIndex < 0) currentModalIndex = filteredIndices.length - 1;
            if (currentModalIndex >= filteredIndices.length) currentModalIndex = 0;
            
            openModal(filteredIndices[currentModalIndex]);
        }

        function closeModal(event) {
            if (event && event.target.closest('.modal-content') && !event.target.classList.contains('close-btn')) {
                return;
            }
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('media-content-container').innerHTML = '';
        }
    </script>
</body>

</html>
